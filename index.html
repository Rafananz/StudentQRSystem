<!DOCTYPE html>
<html>
<head>
    <title>Student Management System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
    <div class="logo">🎓 <span>Student</span>QR System</div>
</header>

<div class="page">
    <div class="toolbar">
        <div>
            <div class="page-title">Student Records</div>
            <div class="page-subtitle" style="margin-bottom:0; border:none; padding:0;">Manage enrolled students and their QR codes.</div>
        </div>
        <button class="btn btn-primary" onclick="window.location='add.html'">+ Add Student</button>
    </div>

    <div class="card" style="padding: 0; overflow: hidden;">
        <table>
            <thead>
                <tr>
                    <th>Student ID</th>
                    <th>Full Name</th>
                    <th>Year & Section</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="studentTable"></tbody>
        </table>
    </div>
</div>

<script type="module" src="js/app.js"></script>
</body>
</html>
