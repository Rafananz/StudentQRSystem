<!DOCTYPE html>
<html>
<head>
    <title>Student Profile</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
    <div class="logo">🎓 <span>Student</span>QR System</div>
</header>

<div class="page" style="max-width: 500px;">
    <div id="loading"><p>Loading student details...</p></div>
    <div id="error" style="display:none"></div>

    <div class="card" id="studentCard" style="display:none">
        <div class="profile-header">
            <h2 id="fullName"></h2>
            <span class="badge" id="badgeId"></span>
        </div>
        <div class="row"><span class="label">Year</span><span class="value" id="year"></span></div>
        <div class="row"><span class="label">Section</span><span class="value" id="section"></span></div>
        <div class="row"><span class="label">Email</span><span class="value" id="email"></span></div>
        <div class="row"><span class="label">Emergency Contact</span><span class="value" id="emmergencycontact"></span></div>
        <div class="row"><span class="label">Adviser</span><span class="value" id="adviser"></span></div>
    </div>
</div>

<script type="module" src="js/student.js"></script>
</body>
</html>
