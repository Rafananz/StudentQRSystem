<!DOCTYPE html>
<html>
<head>
    <title>Student Details</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="loading"><p>Loading student details...</p></div>
<div id="error" style="display:none"></div>

<div class="card" id="studentCard" style="display:none">
    <h2>🎓 Student Profile</h2>
    <span class="badge" id="badgeId"></span>
    <div class="row"><span class="label">Full Name</span><span class="value" id="fullName"></span></div>
    <div class="row"><span class="label">Year</span><span class="value" id="year"></span></div>
    <div class="row"><span class="label">Section</span><span class="value" id="section"></span></div>
    <div class="row"><span class="label">Email</span><span class="value" id="email"></span></div>
    <div class="row"><span class="label">Contact</span><span class="value" id="contact"></span></div>
</div>

<script type="module" src="js/student.js"></script>

</body>
</html>
